services:
  blaze:
    image: "samply/blaze:main@sha256:bac70d4f01b9213e16a28d97632310d1591e5021677bb36f5d6ccfa16d4efdab"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx2g"
      DB_BLOCK_CACHE_SIZE: "2048"
      ENABLE_ADMIN_API: "true"
    ports:
    - "8080:8080"
    volumes:
    - "blaze-data:/app/data"

volumes:
  blaze-data:
