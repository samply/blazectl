services:
  blaze:
    image: "samply/blaze:main@sha256:bb0e7ff7910e8e3801c2e41003c020773cc3942f3c4da74cffdbaa220bf8382e"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx2g"
      DB_BLOCK_CACHE_SIZE: "2048"
      ENABLE_ADMIN_API: "true"
    ports:
    - "8080:8080"
    volumes:
    - "blaze-data:/app/data"

volumes:
  blaze-data:
