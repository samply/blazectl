services:
  blaze:
    image: "samply/blaze:pr-3900@sha256:9b40f518cf4d752a1c6f5e8da494026d5cc25b7227dfc90b101eabc1b4dcf37c"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx2g"
      DB_BLOCK_CACHE_SIZE: "2048"
      ENABLE_ADMIN_API: "true"
    ports:
    - "8080:8080"
    volumes:
    - "blaze-data:/app/data"

volumes:
  blaze-data:
