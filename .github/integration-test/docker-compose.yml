services:
  blaze:
    image: "samply/blaze:main@sha256:cd166c725c76e3e69875f57fd40d6627bbd2256cbf3534b7d36a869c1f10e387"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx2g"
      DB_BLOCK_CACHE_SIZE: "2048"
      ENABLE_ADMIN_API: "true"
    ports:
    - "8080:8080"
    volumes:
    - "blaze-data:/app/data"

volumes:
  blaze-data:
