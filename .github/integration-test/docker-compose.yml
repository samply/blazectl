services:
  blaze:
    image: "samply/blaze:pr-3900@sha256:280e724a3b9ca8c5b5ddabf624335b2863d8d2b9f333e04c2a7771753a037335"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx2g"
      DB_BLOCK_CACHE_SIZE: "2048"
      ENABLE_ADMIN_API: "true"
    ports:
    - "8080:8080"
    volumes:
    - "blaze-data:/app/data"

volumes:
  blaze-data:
